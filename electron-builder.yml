appId: com.omnizen.desktop
productName: Omnizen
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!svelte.config.mjs'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
extraResources:
  - from: CHANGELOG.md
    to: CHANGELOG.md
asarUnpack:
  - resources/**
  - node_modules/node-pty/**
win:
  executableName: omnizen
  legalTrademarks: © 2026 Anchorblock Venture Capital
  # publisherName lives under signtoolOptions in electron-builder 26.x but
  # only matters when we actually sign - skipping until we have a cert.
nsis:
  artifactName: ${name}-${arch}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  license: LICENSE
  warningsAsErrors: false
mac:
  target:
    - target: dmg
    - target: zip
      arch:
        - x64
        - arm64
  artifactName: ${name}-${arch}-mac.${ext}
  category: public.app-category.productivity
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
    - NSHumanReadableCopyright: © 2026 Anchorblock Venture Capital. AGPL-3.0-or-later.
    - CFBundleGetInfoString: Omnizen Desktop - every frontier model on one plan.
    - NSSupportsAutomaticGraphicsSwitching: true
dmg:
  artifactName: ${name}-${arch}.${ext}
  title: ${productName}
  contents:
    - x: 225
      y: 250
      type: file
    - x: 400
      y: 240
      type: link
      path: /Applications
linux:
  # Flatpak is chronically flaky on the ubuntu-latest-x64 runner: the
  # electronjs Electron2 BaseApp cache rename races, exits the job 1,
  # and strands the otherwise-successful .deb/.AppImage/.snap uploads.
  # AppImage already covers the distro-agnostic use case Flatpak users
  # would reach for, so we drop it from the matrix until upstream is
  # less brittle.
  target:
    - AppImage
    - snap
    - deb
  maintainer: omnizen.ai
  vendor: Anchorblock Venture Capital
  synopsis: Native chat app routing every frontier model through your Omnizen plan
  description: |
    Omnizen Desktop is a fork of Open WebUI Desktop, pre-wired to your Omnizen
    subscription. Chat history and uploaded files stay on your machine; every
    chat completion routes through api.omnizen.ai so one key powers every
    frontier model.
  category: Network
  extraResources:
    # AppStream metainfo so GNOME Software / KDE Discover render
    # name + license + description for the installed package.
    - from: build/com.omnizen.desktop.metainfo.xml
      to: ../share/metainfo/com.omnizen.desktop.metainfo.xml
deb:
  artifactName: ${name}_${arch}.${ext}
snap:
  artifactName: ${name}_${arch}.${ext}
appImage:
  artifactName: ${name}_${arch}.${ext}
npmRebuild: true
publish:
  provider: github
  owner: anchorblock
  repo: desktop
